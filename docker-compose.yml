version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: nagarik_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: nagarik
    ports:
      - "5432:5432"
    volumes:
      - nagarik_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  nagarik_pgdata:
