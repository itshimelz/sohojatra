services:
  api:
    build: .
    container_name: nagarik-api
    ports:
      - "8001:8001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    env_file: ../.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - model_cache:/root/.cache/huggingface
    restart: unless-stopped
    networks:
      - sohojatra-net

  redis:
    image: redis:7-alpine
    container_name: nagarik-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sohojatra-net

volumes:
  redis_data:
  model_cache:

networks:
  sohojatra-net:
    driver: bridge
